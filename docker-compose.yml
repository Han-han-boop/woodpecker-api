version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: woodpecker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: woodpecker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-c11886f6096c67ba4370a0afc6bbc4ea}
      POSTGRES_DB: woodpecker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodpecker -d woodpecker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: woodpecker-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://woodpecker:${DB_PASSWORD:-c11886f6096c67ba4370a0afc6bbc4ea}@postgres:5432/woodpecker?schema=public
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-31bd274d059b8238cad66827b370e0dec2722034bc17a51ca914df77e238c270}
      INVITE_CODE_REQUIRED: "true"
      AUTH_DISABLED: "false"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
